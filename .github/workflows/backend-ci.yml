name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: silent_frequency
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d silent_frequency"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: silent_frequency
      PGHOST: localhost
      PGPORT: 5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages (psql client)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Prepare migration log file
        run: mkdir -p ci-artifacts

      - name: Wait for Postgres service to be ready
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for Postgres... attempt $i"
            sleep 2
          done

      - name: Backup test DB (pg_dump from runner)
        env:
          PGPASSWORD: ${{ env.PGPASSWORD }}
        run: |
          echo "Backing up test DB to ci-artifacts/pre_migration.sql"
          pg_dump -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" > ci-artifacts/pre_migration.sql
          echo "Backup saved to ci-artifacts/pre_migration.sql"

      - name: Apply migration in test DB (non-interactive)
        env:
          PGPASSWORD: ${{ env.PGPASSWORD }}
        run: |
          echo "Applying migration backend/app/db/migrations/20260321_gameplay_v2.sql"
          psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -f backend/app/db/migrations/20260321_gameplay_v2.sql | tee ci-artifacts/migration-apply.log

      - name: Run targeted backend tests
        run: |
          python -m pytest -q \
            backend/app/tests/test_gameplay_v2_flow.py \
            backend/app/tests/test_gameplay_v2_models.py \
            backend/app/tests/test_gameplay_v2_schemas.py \
            backend/app/tests/test_action_telemetry.py \
            backend/app/tests/test_action_telemetry_metrics.py

      - name: Run full backend suite (non-blocking)
        continue-on-error: true
        run: |
          python -m pytest -q | tee ci-artifacts/full-suite.log

      - name: Upload backend CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-artifacts
          path: ci-artifacts/
